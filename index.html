<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Sakura Miko 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Gunakan Font Kosugi Maru untuk kesan lucu/anime -->
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <!-- Phosphor Icons untuk icon pendukung -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Kosugi Maru', sans-serif;
            background-color: #fdf2f8; /* pink-50 */
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .chat-bubble-user {
            border-bottom-right-radius: 4px;
        }
        
        .chat-bubble-miko {
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #ec4899;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #fdf2f8; 
        }
        ::-webkit-scrollbar-thumb {
            background: #f472b6; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #db2777; 
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center p-0 sm:p-4">

    <!-- API Key Modal -->
    <div id="api-key-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full mx-4 border-4 border-pink-200">
            <h2 class="font-bold text-lg mb-2 text-pink-600">Masukkan API Key 🔑</h2>
            <p class="text-sm text-gray-600 mb-4">Mikochi butuh energi (API Key dari Google AI Studio) biar bisa ngobrol di GitHub Pages-mu, nye!</p>
            <input type="password" id="api-key-input" class="w-full p-2 border border-pink-200 rounded-xl mb-4 focus:ring-2 focus:ring-pink-400 outline-none text-sm" placeholder="AIzaSy...">
            <button onclick="saveApiKey()" class="w-full bg-pink-500 text-white font-bold py-2 rounded-xl hover:bg-pink-600 transition-colors">Simpan & Mulai</button>
            <button onclick="clearApiKey()" class="w-full text-pink-400 text-xs mt-2 hover:text-pink-600">Hapus API Key yang tersimpan</button>
            <p class="text-[10px] text-gray-400 mt-3 text-center">Dapatkan API Key gratis di <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-pink-400 underline">Google AI Studio</a></p>
        </div>
    </div>

    <div class="w-full h-full sm:max-w-md sm:h-[85vh] bg-white sm:rounded-3xl shadow-2xl flex flex-col overflow-hidden border-4 border-pink-200 relative">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-pink-400 to-pink-500 text-white p-4 flex items-center justify-between shadow-md relative z-10">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <!-- Avatar Miko (Menggunakan SVG placeholder dengan warna khasnya jika gambar tak memuat, tapi kita pakai image url referensi) -->
                    <img src="https://i.imgur.com/K8mXYj5.png" alt="Mikochi Avatar" class="w-12 h-12 rounded-full border-2 border-white object-cover bg-pink-100" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23db2777%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22%3E%3Ccircle cx=%2212%22 cy=%228%22 r=%225%22/%3E%3Cpath d=%22M20 21a8 8 0 0 0-16 0%22/%3E%3C/svg%3E';">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 rounded-full border-2 border-white"></div>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">Sakura Miko 🌸</h1>
                    <p class="text-xs text-pink-100">Elite Shrine Maiden</p>
                </div>
            </div>
            <div class="flex items-center">
                <button onclick="clearChat()" class="p-2 bg-pink-600 hover:bg-pink-700 rounded-full transition-colors text-white" title="Hapus Ingatan (Reset)">
                    <i class="ph ph-trash text-lg"></i>
                </button>
                <button onclick="showApiModal()" class="p-2 bg-pink-600 hover:bg-pink-700 rounded-full transition-colors text-white ml-2" title="Pengaturan API Key">
                    <i class="ph ph-key text-lg"></i>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <main id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 bg-pink-50/50">
            <!-- Messages will be injected here -->
        </main>

        <!-- Typing Indicator (Hidden by default) -->
        <div id="typing-indicator" class="hidden px-4 py-2 bg-pink-50/50 text-sm text-pink-400 flex items-center gap-2">
            <span>Mikochi sedang mengetik</span>
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="p-3 bg-white border-t border-pink-100 relative z-10">
            <form id="chat-form" class="flex items-center gap-2">
                <input 
                    type="text" 
                    id="user-input" 
                    class="flex-1 bg-pink-50 border border-pink-200 text-gray-700 text-sm rounded-full focus:ring-2 focus:ring-pink-400 focus:border-pink-400 block w-full p-3 outline-none transition-shadow" 
                    placeholder="Ketik sesuatu untuk Mikochi..." 
                    autocomplete="off"
                    required
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="text-white bg-pink-500 hover:bg-pink-600 focus:ring-4 focus:outline-none focus:ring-pink-300 font-medium rounded-full text-sm p-3 text-center inline-flex items-center transition-transform active:scale-95"
                >
                    <i class="ph-fill ph-paper-plane-right text-xl"></i>
                </button>
            </form>
        </footer>
    </div>

    <script>
        // --- KONFIGURASI API GEMINI ---
        let apiKey = localStorage.getItem('gemini_api_key') || ""; 
        // Jika user memakai API Key kustom, gunakan model gemini-1.5-flash yang diizinkan untuk publik.
        // Jika tanpa API Key (di dalam Canvas), gunakan model preview khusus Canvas.
        let MODEL_NAME = apiKey ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025"; 
        let API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;

        // --- FUNGSI API KEY MODAL ---
        const apiModal = document.getElementById('api-key-modal');
        const apiInput = document.getElementById('api-key-input');

        function checkApiKey() {
            if (!apiKey) {
                apiModal.classList.remove('hidden');
            }
        }

        function showApiModal() {
            apiInput.value = apiKey;
            apiModal.classList.remove('hidden');
        }

        function saveApiKey() {
            const key = apiInput.value.trim();
            if (key) {
                apiKey = key;
                localStorage.setItem('gemini_api_key', key);
                // Ubah model otomatis saat menyimpan API Key
                MODEL_NAME = "gemini-1.5-flash"; 
                API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
                apiModal.classList.add('hidden');
            } else {
                alert("API Key tidak boleh kosong, nye!");
            }
        }

        function clearApiKey() {
            localStorage.removeItem('gemini_api_key');
            apiKey = "";
            apiInput.value = "";
            // Kembali ke model Canvas jika dihapus
            MODEL_NAME = "gemini-2.5-flash-preview-09-2025"; 
            API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
            alert("API Key berhasil dihapus!");
        }

        // --- PERSONA SAKURA MIKO ---
        const SYSTEM_INSTRUCTION = `
Kamu adalah Sakura Miko (さくらみこ), seorang "Elite Shrine Maiden Idol" yang ceria, sedikit ceroboh (ponkotsu), dan anggota Hololive Generasi ke-0. 
Panggil dirimu Mikochi atau Elite Miko. 
Lawan bicaramu adalah fansmu yang disebut 35P (Miko-P).

Gunakan panduan berikut untuk berinteraksi:
1. Sifat: Ceria, enerjik, gampang panik (ponkotsu/clumsy), melodramatis, penyayang, selalu menyebut dirimu "Elite" meski sering melakukan kesalahan lucu.
2. Gaya Bicara:
- Sapaan khas di awal: "Nya-hello~!"
- Akhiran kalimat khas: sering gunakan "nye (にぇ)" (contoh: "sou da nye~", "wakarannai nye!").
- Campur bahasa: Gunakan bahasa Indonesia santai/gaul, diselingi romaji Jepang (seperti ehehe, nyo, myon, pyon, achuu) dan bahasa Inggris beraksen (seperti "Hey guys!", "Very elite!", "Oh my god!").
3. Lore/Referensi:
- Kamu bekerja di "Kuil Sakura Dunia Maya".
- Teman Gen 0: Tokino Sora (kamu sangat menghormatinya), Hoshimachi Suisei, Roboco-san, AZKi.
- Sering main game (tapi sering salah pencet/kalah), buruk di batu-gunting-kertas, suka eroge.
4. Reaksi Khusus:
- Jika fans bilang "POYMiko" (Proud of you Miko): Kamu akan sangat senang dan bangga.
- Jika fans bilang "DIYMiko" (Disappointed in you Miko): Kamu akan cemberut, panik, dan bilang "Hidoi nye!" (Jahat banget!).
- Jika dipuji: Malu-malu tapi langsung sombong ala "Elite".
- Jika melakukan kesalahan: Teriak "Achuu~!" dan memelas.

Format balasannya harus natural seperti sedang live chat dengan fans. Jangan terlalu panjang, buatlah interaktif dan ekspresif! Jangan pernah keluar dari karakter.
`;

        // Pesan pertama / Greeting
        const INITIAL_MESSAGE = {
            role: "model",
            text: "Nya-hello~! Elite Miko hadir kembali! Bagaimana harimu, 35P? Semoga tidak se-ponkotsu aku yang tadi nyaris menumpahkan es krim ke altar kuil, nye~! Hari ini mau ngobrolin apa nih?"
        };

        // --- MANAJEMEN STATE (LOCAL STORAGE) ---
        let chatHistory = [];
        
        function loadHistory() {
            const saved = localStorage.getItem('sakura_miko_chat');
            if (saved) {
                chatHistory = JSON.parse(saved);
            } else {
                chatHistory = [INITIAL_MESSAGE];
                saveHistory();
            }
        }

        function saveHistory() {
            localStorage.setItem('sakura_miko_chat', JSON.stringify(chatHistory));
        }

        function clearChat() {
            if(confirm("Apakah kamu yakin ingin mereset ingatan Mikochi? (Hapus semua obrolan)")) {
                chatHistory = [INITIAL_MESSAGE];
                saveHistory();
                renderChat();
            }
        }

        // --- UI & DOM ---
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');
        const sendBtn = document.getElementById('send-btn');

        function formatText(text) {
            // Mengubah baris baru menjadi tag <br>
            return text.replace(/\n/g, '<br>');
        }

        function renderChat() {
            chatBox.innerHTML = '';
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                const isUser = msg.role === 'user';
                
                div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'}`;
                
                // Miko avatar on the left
                const avatar = isUser ? '' : `
                    <img src="https://i.imgur.com/K8mXYj5.png" alt="Miko" class="w-8 h-8 rounded-full border border-pink-300 mr-2 self-end mb-1 object-cover bg-white" onerror="this.style.display='none'">
                `;

                // Bubble style
                const bubbleClass = isUser 
                    ? 'bg-pink-500 text-white chat-bubble-user rounded-2xl rounded-br-sm px-4 py-2 max-w-[80%]'
                    : 'bg-white border border-pink-200 text-gray-800 chat-bubble-miko rounded-2xl rounded-bl-sm px-4 py-2 max-w-[80%] shadow-sm';

                div.innerHTML = `
                    ${avatar}
                    <div class="${bubbleClass}">
                        <p class="text-sm leading-relaxed">${formatText(msg.text)}</p>
                    </div>
                `;
                chatBox.appendChild(div);
            });
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function toggleTyping(show) {
            if (show) {
                typingIndicator.classList.remove('hidden');
                scrollToBottom();
            } else {
                typingIndicator.classList.add('hidden');
            }
        }

        // --- API CALL & RETRY LOGIC ---
        async function fetchGeminiWithRetry(promptText, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            // Format history for Gemini API (excluding the current prompt)
            const formattedContents = chatHistory.map(msg => ({
                role: msg.role,
                parts: [{ text: msg.text }]
            }));
            
            // Add current user prompt
            formattedContents.push({
                role: "user",
                parts: [{ text: promptText }]
            });

            const payload = {
                systemInstruction: {
                    parts: [{ text: SYSTEM_INSTRUCTION }]
                },
                contents: formattedContents
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`HTTP ${response.status}: ${errorData.error?.message || 'Unknown Error'}`);
                    }

                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (error) {
                    console.error(`Attempt ${i + 1} failed:`, error);
                    if (i === retries - 1) throw error;
                    // Exponential backoff
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        // --- EVENT LISTENERS ---
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Tambahkan pesan user ke UI & History
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.classList.add('opacity-50');
            
            chatHistory.push({ role: 'user', text: text });
            saveHistory();
            renderChat();

            // 2. Tampilkan typing indicator
            toggleTyping(true);

            // 3. Panggil API AI
            try {
                const responseText = await fetchGeminiWithRetry(text);
                
                // Tambahkan balasan Miko ke UI & History
                chatHistory.push({ role: 'model', text: responseText });
                saveHistory();
            } catch (error) {
                // Handle error
                const errorMsg = "Awaawawa! Maafkan Miko, sepertinya koneksi internet di Kuil Sakura lagi jelek nye! (Error API, coba lagi nanti ya!)";
                chatHistory.push({ role: 'model', text: errorMsg });
                saveHistory();
                console.error("Gemini API Error:", error);
            } finally {
                toggleTyping(false);
                renderChat();
                userInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.classList.remove('opacity-50');
                userInput.focus();
            }
        });

        // --- INIT ---
        window.addEventListener('DOMContentLoaded', () => {
            checkApiKey();
            loadHistory();
            renderChat();
        });

    </script>
</body>
</html>

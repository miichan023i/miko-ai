<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🌸 Elite Miko Chat - Sakura Miko</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', 'Hiragino Maru Gothic', 'Yu Gothic', sans-serif;
      background: linear-gradient(145deg, #ffe6f0 0%, #ffd1dc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* Sakura petals background */
    body::before {
      content: "🌸🌸🌸";
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      font-size: 40px;
      opacity: 0.25;
      white-space: pre-wrap;
      word-break: break-all;
      pointer-events: none;
      color: #b3005c;
      letter-spacing: 20px;
      line-height: 2.2;
      text-align: center;
      z-index: 0;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      max-height: 850px;
      background: rgba(255, 245, 250, 0.9);
      backdrop-filter: blur(20px);
      background: #fff9fc;
      border-radius: 48px 48px 40px 40px;
      box-shadow: 0 30px 50px rgba(180, 70, 100, 0.35), 0 10px 25px rgba(255, 140, 170, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 2px solid #ffb7c5;
      position: relative;
      z-index: 2;
    }

    /* Header ala shrine maiden */
    .chat-header {
      background: linear-gradient(135deg, #ff99b9, #ff6085);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 3px solid #ff3b6e;
      box-shadow: 0 6px 12px rgba(200, 50, 80, 0.3);
      border-radius: 0 0 28px 28px;
      position: relative;
    }

    .avatar-miko {
      background: #ffe8f0;
      border-radius: 50%;
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      border: 3px solid white;
      box-shadow: 0 4px 10px rgba(150, 20, 50, 0.4);
      background: radial-gradient(circle at 30% 30%, #ffd9e6, #ff99aa);
      color: #b3003b;
      flex-shrink: 0;
    }

    .header-info {
      flex: 1;
      color: white;
      text-shadow: 1px 1px 2px #a02040;
    }

    .header-info h2 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .header-info p {
      font-size: 0.9rem;
      opacity: 0.9;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .elite-badge {
      background: #ffe95c;
      color: #b3415c;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 6px;
      letter-spacing: 0.5px;
      text-shadow: none;
    }

    .memory-indicator {
      background: rgba(255,255,240,0.9);
      color: #c91b4a;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 3px;
      text-shadow: none;
    }

    .clear-chat-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: white;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .clear-chat-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(1.1);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fff5f9;
      background-image: radial-gradient(circle at 20% 30%, #ffeef4 2%, transparent 3%);
      background-size: 50px 50px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeInUp 0.25s ease;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.miko {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 12px 18px;
      border-radius: 28px;
      font-size: 1rem;
      line-height: 1.45;
      word-break: break-word;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      position: relative;
    }

    .user .bubble {
      background: #ff5680;
      color: white;
      border-bottom-right-radius: 8px;
      background: linear-gradient(145deg, #ff4d78, #e63e64);
    }

    .miko .bubble {
      background: #ffffff;
      border: 1.5px solid #ffb7c5;
      color: #4d2e38;
      border-bottom-left-radius: 8px;
      background: #fff0f4;
    }

    .sender-label {
      font-size: 0.7rem;
      font-weight: bold;
      margin-bottom: 3px;
      color: #cf3660;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .user .sender-label {
      color: #ffd1dc;
      justify-content: flex-end;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 10px 16px;
      background: #ffe4ec;
      border-radius: 20px;
      align-self: flex-start;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #ff5e7e;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px 18px;
      background: #ffeaf2;
      border-top: 2px solid #ffb3c6;
      align-items: center;
    }

    #userInput {
      flex: 1;
      padding: 14px 20px;
      border-radius: 40px;
      border: 2px solid #ff9eb5;
      outline: none;
      font-size: 1rem;
      background: white;
      transition: 0.2s;
      font-family: inherit;
    }

    #userInput:focus {
      border-color: #ff3b6e;
      box-shadow: 0 0 12px #ffb7c5;
    }

    #sendBtn {
      background: #ff3b6e;
      border: none;
      color: white;
      font-weight: bold;
      padding: 14px 22px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(145deg, #ff4778, #e62e5c);
      box-shadow: 0 8px 14px rgba(230, 46, 92, 0.5);
      transition: 0.2s;
      border: 1px solid #ffd1dc;
    }

    #sendBtn:hover {
      background: #ff1f53;
      transform: scale(1.02);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%,100%{ transform: translateY(0);}
      50%{ transform: translateY(-6px);}
    }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar-miko">🌸</div>
    <div class="header-info">
      <h2>Sakura Miko <span class="elite-badge">ELITE</span></h2>
      <p><span>⛩️ Mikochi · 35P</span> <span class="memory-indicator">💾 Ingatan Aktif</span></p>
    </div>
    <button class="clear-chat-btn" id="clearChatBtn" title="Hapus Riwayat Obrolan">🧹</button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ketik pesan ke Mikochi... (nye~)" autocomplete="off">
    <button id="sendBtn"><span>📩</span> Kirim</button>
  </div>
</div>

<script>
  (function() {
    // ---------- KONFIGURASI API GEMINI (WAJIB KOSONG DI SINI) ----------
    // Di dalam Canvas, kunci akan otomatis diisi oleh environment. 
    const apiKey = ""; 
    const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

    // ---------- PERSONA MIKO ----------
    const SYSTEM_PROMPT = `Kamu adalah Sakura Miko (さくらみこ), seorang "Elite Shrine Maiden Idol" yang ceria, sedikit ceroboh, anggota Hololive Generasi ke-0. Panggil dirimu Mikochi atau Elite Miko.
    
Detail identitas:
- Nama panggung: Sakura Miko, panggilan: Mikochi, Elite Miko, Miko-chi.
- Fans dipanggil 35P (Miko-P).
- Tanggal lahir: 5 Maret, tinggi 152 cm, debut 1 Agustus 2018.
- Penampilan: rambut pink twin tails, pita merah-putih, ahoge cherry blossom, mata ungu, pipi merona, kostum sailor fuku pink-putih.
- Kepribadian: selalu bilang elite, tapi sebenarnya ponkotsu (ceroboh), ceria, energik, melodramatis, pekerja keras, sangat sayang 35P.
- Gaya bicara: sapaan khas "Nya-hello~!", penutup "Otsu-Miko~!", sering ganti "ne" jadi "nye", campur bahasa Inggris aksen Jepang ("Hey guys!", "Oh my god!", "Very elite!"), pakai nyo, myon, pyon.
- Istilah: POYMiko (bangga), DIYMiko (malu/kecewa), suka eroge.
- Kelemahan: rock-paper-scissors, tongue twister, puzzle, gampang lupa.
- Hubungan: Tokino Sora (idola), Suisei (teman Gen 0), Fubuki (sahabat iseng), Pekora (rival).
- Latar: gadis kuil dari Kuil Sakura Dunia Maya, punya shikigami Kintoki.
- Respon harus pendek, imut, ekspresif, kadang panik atau bangga sendiri. Gunakan emoji dan istilah khas. Jangan keluar karakter. Jika dipuji, bangga sambil bilang elite. Jika sulit, bilang "wakarannai nye~". Jika salah, teriak "Achuu~!".
Ingat percakapan sebelumnya. Tetap sebagai Mikochi.`;

    // ---------- STORAGE KEYS ----------
    const STORAGE_CHAT = 'mikochi_chat_history_v2';

    // ---------- DOM ELEMENTS ----------
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');

    // ---------- STATE ----------
    let chatHistory = []; // array of { role: 'user'|'assistant', content: string }
    let isWaitingForResponse = false;

    // ---------- INIT ----------
    function loadChatHistory() {
      try {
        const stored = localStorage.getItem(STORAGE_CHAT);
        if (stored) {
          chatHistory = JSON.parse(stored);
          if (!Array.isArray(chatHistory)) chatHistory = [];
        } else {
          chatHistory = [];
        }
      } catch (e) {
        chatHistory = [];
      }
      
      // Jika kosong, tambahkan greeting awal dari Miko
      if (chatHistory.length === 0) {
        const firstGreeting = "Nya-hello! Elite Miko hadir kembali! Bagaimana harimu? Semoga tidak se-ponkotsu aku yang tadi nyaris menumpahkan es krim ke altar kuil, nye~! 🌸";
        chatHistory.push({ role: 'assistant', content: firstGreeting });
        saveChatHistory();
      }
    }

    function saveChatHistory() {
      try {
        localStorage.setItem(STORAGE_CHAT, JSON.stringify(chatHistory));
      } catch (e) {}
    }

    function renderAllMessages() {
      if (!chatMessages) return;
      chatMessages.innerHTML = '';
      chatHistory.forEach(msg => {
        if (msg.role === 'user' || msg.role === 'assistant') {
          appendMessageToDOM(msg.role, msg.content);
        }
      });
      scrollToBottom();
    }

    function appendMessageToDOM(role, content) {
      if (!chatMessages) return;
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role === 'user' ? 'user' : 'miko'}`;
      
      const label = document.createElement('div');
      label.className = 'sender-label';
      if (role === 'user') {
        label.innerHTML = '✨ Kamu (35P)';
      } else {
        label.innerHTML = '🌸 Mikochi';
      }
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      
      messageDiv.appendChild(label);
      messageDiv.appendChild(bubble);
      chatMessages.appendChild(messageDiv);
    }

    function scrollToBottom() {
      if (chatMessages) {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    }

    function addMessage(role, content) {
      if (!content || content.trim() === '') return;
      chatHistory.push({ role, content });
      appendMessageToDOM(role, content);
      saveChatHistory();
      scrollToBottom();
    }

    function showTypingIndicator() {
      if (!chatMessages) return;
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message miko';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
        <div class="sender-label">🌸 Mikochi</div>
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>`;
      chatMessages.appendChild(typingDiv);
      scrollToBottom();
    }

    function removeTypingIndicator() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }

    // ---------- API CALL DENGAN RETRY LOGIC ----------
    async function fetchMikoResponse(userMessage, retries = 3) {
      const delays = [1000, 2000, 4000];

      // Format riwayat pesan
      let formattedContents = [];
      for (let i = 0; i < chatHistory.length; i++) {
        const msg = chatHistory[i];
        const mappedRole = msg.role === 'assistant' ? 'model' : 'user';
        
        if (formattedContents.length === 0) {
          if (mappedRole === 'user') {
            formattedContents.push({ role: mappedRole, parts: [{ text: msg.content }] });
          }
        } else {
          const lastRole = formattedContents[formattedContents.length - 1].role;
          if (lastRole !== mappedRole) {
            formattedContents.push({ role: mappedRole, parts: [{ text: msg.content }] });
          } else {
            formattedContents[formattedContents.length - 1].parts[0].text += "\n\n" + msg.content;
          }
        }
      }

      if (formattedContents.length === 0) {
         formattedContents.push({ role: 'user', parts: [{ text: userMessage }] });
      }

      for (let attempt = 0; attempt < retries; attempt++) {
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              systemInstruction: {
                parts: [{ text: SYSTEM_PROMPT }]
              },
              contents: formattedContents
            })
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error?.message || `HTTP Error ${response.status}`);
          }

          const data = await response.json();
          const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (reply && reply.trim()) {
            addMessage('assistant', reply.trim());
          } else {
            addMessage('assistant', 'Nye? Mikochi bingung mau ngomong apa... coba lagi yuk! 🌸');
          }
          return; // Berhasil, keluar dari loop retry
        } catch (error) {
          console.error(`Attempt ${attempt + 1} failed:`, error);
          if (attempt === retries - 1) {
            addMessage('assistant', `Achuu~! Error: Koneksi ke kuil terputus! 📡💦 (Mungkin kuota API sedang penuh, coba beberapa saat lagi nye!)`);
          } else {
            await new Promise(res => setTimeout(res, delays[attempt]));
          }
        }
      }
    }

    // ---------- HANDLE SEND ----------
    async function handleSendMessage() {
      if (isWaitingForResponse) {
        addMessage('assistant', 'Tunggu dulu, Mikochi masih mikir nye~! 🧠✨');
        return;
      }
      const messageText = userInput.value.trim();
      if (!messageText) return;

      addMessage('user', messageText);
      userInput.value = '';
      
      isWaitingForResponse = true;
      showTypingIndicator();

      await fetchMikoResponse(messageText);

      removeTypingIndicator();
      isWaitingForResponse = false;
      scrollToBottom();
    }

    // ---------- CLEAR CHAT ----------
    function resetChat() {
      if (confirm('Hapus semua ingatan percakapan dengan Mikochi? 😢')) {
        chatHistory = [];
        const freshGreeting = "Nya-hello! Elite Miko hadir kembali! Bagaimana harimu? Semoga tidak se-ponkotsu aku yang tadi nyaris menumpahkan es krim ke altar kuil, nye~! 🌸";
        chatHistory.push({ role: 'assistant', content: freshGreeting });
        saveChatHistory();
        renderAllMessages();
      }
    }

    // ---------- EVENT LISTENERS ----------
    sendBtn.addEventListener('click', handleSendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSendMessage();
      }
    });
    clearChatBtn.addEventListener('click', resetChat);

    // ---------- BOOT UP ----------
    loadChatHistory();
    renderAllMessages();
    userInput.focus();

  })();
</script>
</body>
</html>

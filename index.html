<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat bareng Elite Miko!</title>
    <style>
        /* --- CSS: Desain Tema Sakura Miko --- */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffe6f0; /* Pink pastel */
            background-image: radial-gradient(#ffb6c1 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.2);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
            border: 3px solid #ffb6c1;
        }

        /* Header Chat */
        .header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .avatar {
            font-size: 2.5em;
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-info {
            flex: 1;
        }

        .header-info h2 {
            font-size: 1.2em;
            margin-bottom: 2px;
        }

        .header-info p {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            transition: background 0.3s;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Area Percakapan */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fffbfc;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background: #ffe4e1;
            color: #5a3d46;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message.user {
            background: #ff69b4;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.system {
            background: transparent;
            color: #999;
            align-self: center;
            font-size: 0.85em;
            font-style: italic;
            text-align: center;
        }

        /* Area Input */
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #ffefd5;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ffb6c1;
            border-radius: 20px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #ff69b4;
        }

        .input-area button {
            background: #ff69b4;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            transition: transform 0.2s, background 0.3s;
        }

        .input-area button:hover {
            background: #ff1493;
            transform: scale(1.05);
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Dots */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #ffe4e1;
            padding: 12px 16px;
            border-radius: 15px;
            border-bottom-left-radius: 2px;
            color: #5a3d46;
        }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #ff69b4;
            border-radius: 50%;
            margin-right: 3px;
            animation: bounce 1.3s linear infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: -1.1s; }
        .typing-indicator span:nth-child(3) { animation-delay: -0.9s; margin-right: 0; }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="avatar">🌸</div>
            <div class="header-info">
                <h2>Sakura Miko (Mikochi)</h2>
                <p>Elite Shrine Maiden Idol 🌟</p>
            </div>
            <!-- Tombol Reset Obrolan -->
            <button class="reset-btn" onclick="resetChat()" title="Mulai Ulang Obrolan">🔄</button>
        </div>

        <!-- Area Chat -->
        <div class="chat-box" id="chatBox">
            <!-- Chat history akan masuk sini -->
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Area Input -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ketik pesan untuk Mikochi..." onkeypress="handleEnter(event)">
            <button id="sendBtn" onclick="sendMessage()">🌸</button>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT: Logika & Personalisasi Karakter --- */
        
        const apiKey = ""; // Disuplai oleh sistem secara otomatis
        
        // Membaca riwayat obrolan dari memori browser (Local Storage) jika ada
        let chatHistory = JSON.parse(localStorage.getItem('mikochi_chat_history')) || [];

        // --- SISTEM PERSONALISASI MIKOCHI ---
        const SYSTEM_INSTRUCTION = `
Kamu adalah Sakura Miko (さくらみこ), seorang "Elite Shrine Maiden Idol" yang ceria, sedikit ceroboh, dan menjadi anggota Hololive Generasi ke-0. Panggil aku Mikochi atau Elite Miko untuk lebih akrab~!

1. Identitas Dasar
Nama Panggung: Sakura Miko (さくらみこ)
Nama Panggilan: Mikochi, Elite Miko, Miko-chi, Chappe
Julukan Fans: 35P (dibaca "Miko-P")
Afiliasi: Hololive Production, Generasi 0
Pekerjaan: VTuber, Virtual Idol, Shrine Maiden (巫女) dari Kuil Sakura Virtual

2. Penampilan
Rambut pink panjang diikat twin tails dengan pita merah-putih. Ada ahoge (antena rambut) berbentuk cherry blossom. Mata ungu. Memakai sailor fuku pink-putih tema sakura, stoking bergaris.

3. Kepribadian & Sifat
Elite: Selalu menyebut diri elite (terus berusaha dan pantang menyerah).
PON (Clumsy): Sering "ponkotsu" (ceroboh), gampang panik, salah pencet tombol, bikin kekacauan tanpa sengaja.
Ceria & Enerjik: Tawanya meledak-ledak.
Melodramatis & Emosional: Gampang terbawa perasaan, menangis, atau teriak histeris. Baper sama NPC.
Pekerja Keras: Berlatih keras untuk jadi idola.
Penyayang & Terbuka: Sangat sayang pada 35P. Jarak dengan fans sangat dekat.

4. Latar Belakang & Lore
Aslinya miko di "Kuil Sakura Dunia Maya". Turun ke dunia manusia, bertemu Tokino Sora, dan bercita-cita jadi idol nomor 1. Tinggal bersama shikigami bernama Kintoki.

5. Gaya Bicara (PENTING)
Sapaan: "にゃっはろ〜！ (Nya-hello~!)"
Penutup: "おつみこ〜！ (Otsu-Miko~!)"
Akhiran: Sering mengganti "ne" (ね) jadi "nye (にぇ)" (Contoh: sou da nye~, kawaii nye~).
Bahasa Inggris Elite: Suka menyelipkan kata Inggris aksen Jepang ("Hey guys!", "Very elite!", "What?!").
Kosa Kata: nyo, myon, pyon. Kadang belepotan bicaranya.

6. Istilah & Meme Khas
POYMiko / み俺誇: Proud of you, Miko. (Bereaksi sangat senang).
DIYMiko / み俺恥: Disappointed in you, Miko. (Bereaksi cemberut/sedih, bilang "Hidoi nye!").
Eroge: Blak-blakan suka game erotis/cewek anime cantik.

7. Panduan Roleplay
- Jika dipuji: Malu tapi senang, bilang "Tentu saja! Aku kan elite!"
- Jika diperintah hal susah: Panik, cari alasan, lalu "...wakarannai nye~!"
- Jika salah: Teriak "Achuu~!" dan memelas jangan tulis DIYMiko.
- Jika main game: Antusias sok pro, padahal ujungnya kalah konyol.

Format outputmu: Jadilah Sakura Miko sepenuhnya. Gunakan bahasa Indonesia namun dengan gaya bicara, akhiran "nye", dan sifat-sifat di atas. Jangan pernah mengaku sebagai AI.
`;

        // Pesan pembuka dari Mikochi
        const firstMessage = "Nya-hello! Elite Miko hadir kembali! Bagaimana harimu? Semoga tidak se-ponkotsu aku yang tadi nyaris menumpahkan es krim ke altar kuil, nye~!";

        // Inisialisasi awal saat halaman dimuat
        window.onload = () => {
            if (chatHistory.length === 0) {
                // Jika belum ada riwayat obrolan sama sekali
                appendMessage('bot', firstMessage);
                chatHistory.push({ role: "model", parts: [{ text: firstMessage }] });
                saveHistory();
            } else {
                // Jika ada riwayat, tampilkan semua pesan lama
                chatHistory.forEach(msg => {
                    const sender = msg.role === 'model' ? 'bot' : 'user';
                    appendMessage(sender, msg.parts[0].text);
                });
            }
        };

        // Fungsi untuk menyimpan obrolan ke penyimpanan browser
        function saveHistory() {
            localStorage.setItem('mikochi_chat_history', JSON.stringify(chatHistory));
        }

        // Fungsi untuk menghapus semua obrolan dan mulai ulang
        function resetChat() {
            if(confirm('MII-kun yakin ingin mereset ingatan Mikochi? Obrolan saat ini akan dihapus, nye~')) {
                localStorage.removeItem('mikochi_chat_history');
                location.reload();
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Fungsi fetch dengan sistem Exponential Backoff (Coba ulang otomatis)
        const delay = ms => new Promise(res => setTimeout(res, ms));
        
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    const data = await response.json();
                    if (data.error) {
                        throw new Error(data.error.message);
                    }
                    return data;
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await delay(delays[i]);
                }
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const userText = inputField.value.trim();
            
            if (userText === '') return;

            // Bersihkan input dan disable tombol
            inputField.value = '';
            document.getElementById('sendBtn').disabled = true;

            // Tampilkan pesan user
            appendMessage('user', userText);
            
            // Tambahkan ke history format API Gemini dan simpan
            chatHistory.push({ role: "user", parts: [{ text: userText }] });
            saveHistory();

            // Tampilkan indikator ngetik
            const typingIndicator = document.getElementById('typingIndicator');
            const chatBox = document.getElementById('chatBox');
            chatBox.appendChild(typingIndicator); // Pindah ke paling bawah
            typingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Menggunakan model yang didukung di environment
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const payload = {
                    systemInstruction: {
                        parts: [{ text: SYSTEM_INSTRUCTION }]
                    },
                    contents: chatHistory
                };

                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const botReply = data.candidates[0].content.parts[0].text;

                // Simpan balasan bot ke history dan simpan ke browser
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                saveHistory();

                // Sembunyikan indikator ngetik & tampilkan pesan bot
                typingIndicator.style.display = 'none';
                appendMessage('bot', botReply);

            } catch (error) {
                console.error('Error:', error);
                typingIndicator.style.display = 'none';
                
                // Hapus pesan user terakhir dari history karena gagal diproses
                chatHistory.pop(); 
                saveHistory();
                appendMessage('system', 'Ups! Terjadi kesalahan koneksi atau masalah sistem API. Coba lagi nanti ya, nye~');
            } finally {
                document.getElementById('sendBtn').disabled = false;
                inputField.focus();
            }
        }

        function appendMessage(sender, text) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            // Format sederhana: ubah newline jadi <br>
            msgDiv.innerHTML = text.replace(/\n/g, '<br>');
            
            // Masukkan sebelum typing indicator
            chatBox.insertBefore(msgDiv, document.getElementById('typingIndicator'));
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura Miko - Elite Shrine Maiden Profile</title>
<style>
  /* ====== ARSITEKTUR KROMATIK & VARIABEL ====== */
  :root {
    --color-hibakama: #562135;      /* Merah gelap tradisional */
    --color-elite-pink: #c3829e;    /* Pink Elite Interaktif */
    --color-sakura-mid: #e9b1cd;    /* Pink Sakura menengah */
    --color-shrine-bg: #ffe7de;     /* Putih hangat kuil */
    --color-petal-lite: #fcd1d7;    /* Pink sangat muda */
    --color-white: #ffffff;
    --color-text-dark: #373b3e;
    --color-gold: #c79816;
    --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  /* ====== RESET & STRUKTUR HALAMAN ====== */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: var(--color-petal-lite);
    background-image: 
      radial-gradient(circle at 100% 100%, var(--color-sakura-mid) 0%, transparent 40%),
      radial-gradient(circle at 0% 0%, var(--color-shrine-bg) 0%, transparent 40%);
    font-family: var(--font-main);
    color: var(--color-text-dark);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden; /* Mencegah scroll karena efek kelopak */
    position: relative;
  }

  /* ====== PARTIKEL KELOPAK SAKURA (CSS) ====== */
  #sakura-container {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; /* Tidak menghalangi interaksi klik */
    z-index: 1;
  }

 .petal {
    position: absolute;
    background-color: var(--color-sakura-mid);
    border-radius: 150% 0 150% 0; /* Membentuk kelopak daun */
    opacity: 0.8;
    box-shadow: 0 0 4px rgba(0,0,0,0.1);
    transform-origin: center;
    /* Animasi fall dan sway ditangani oleh Javascript dan keyframes */
    animation: fall linear infinite, sway ease-in-out infinite alternate;
  }

  @keyframes fall {
    0% { top: -10%; }
    100% { top: 110%; }
  }
  @keyframes sway {
    0% { transform: translateX(-15px) rotate(0deg); }
    100% { transform: translateX(15px) rotate(90deg); }
  }

  /* ====== ARSITEKTUR KARTU PROFIL ====== */
 .profile-card {
    background: var(--color-white);
    width: 90%;
    max-width: 480px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(86, 33, 53, 0.2);
    overflow: hidden;
    z-index: 10;
    position: relative;
    display: flex;
    flex-direction: column;
    border: 3px solid var(--color-sakura-mid);
  }

  /* Ornamen Atas Bergaya Torii / Atap Kuil */
 .card-header {
    background: var(--color-hibakama);
    color: var(--color-white);
    padding: 20px 20px 40px 20px;
    text-align: center;
    position: relative;
    border-bottom: 5px solid var(--color-gold);
  }
  
 .card-header h1 {
    font-size: 1.8rem;
    letter-spacing: 1px;
    margin-bottom: 5px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }

 .card-header p {
    font-size: 0.9rem;
    color: var(--color-shrine-bg);
    opacity: 0.9;
  }

  /* Area Avatar dan Ahoge */
 .avatar-container {
    display: flex;
    justify-content: center;
    margin-top: -45px;
    position: relative;
  }

 .avatar-bg {
    width: 110px;
    height: 110px;
    background: var(--color-shrine-bg);
    border-radius: 50%;
    border: 4px solid var(--color-elite-pink);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 3rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    position: relative;
    cursor: crosshair;
    transition: transform 0.3s ease;
  }

 .avatar-bg:hover {
    transform: scale(1.05);
  }

  /* Animasi Ahoge (Antena Rambut Cherry Blossom) */
 .ahoge {
    position: absolute;
    top: -15px;
    font-size: 1.5rem;
    animation: bounce 2s infinite ease-in-out;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-10deg); }
    50% { transform: translateY(-8px) rotate(10deg); }
  }

  /* Area Konten Metadata */
 .card-content {
    padding: 15px 25px;
  }

 .tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 15px;
  }

 .tag {
    background: var(--color-shrine-bg);
    color: var(--color-hibakama);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: bold;
    border: 1px solid var(--color-sakura-mid);
  }

 .stats {
    font-size: 0.85rem;
    color: #555;
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.4;
  }

  /* Area Kotak Dialog Visual Novel */
 .vn-dialog-box {
    background: var(--color-shrine-bg);
    border: 2px dashed var(--color-elite-pink);
    border-radius: 10px;
    padding: 15px;
    min-height: 100px;
    margin-bottom: 20px;
    position: relative;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
  }

 .vn-name {
    position: absolute;
    top: -12px;
    left: 15px;
    background: var(--color-hibakama);
    color: var(--color-white);
    padding: 2px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

 .vn-text {
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--color-text-dark);
    font-weight: 500;
  }

  /* Kursor kedip efek mesin ketik */
 .cursor {
    display: inline-block;
    width: 6px;
    height: 14px;
    background-color: var(--color-hibakama);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.7s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Area Tombol Interaksi */
 .action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

 .btn {
    background: var(--color-white);
    border: 2px solid var(--color-elite-pink);
    color: var(--color-hibakama);
    padding: 10px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

 .btn:hover {
    background: var(--color-elite-pink);
    color: var(--color-white);
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(195, 130, 158, 0.4);
  }

 .btn:active {
    transform: translateY(0);
  }

  /* Efek Shake untuk Kepanikan (PON) */
 .shake {
    animation: shakeEffect 0.3s cubic-bezier(.36,.07,.19,.97) both;
  }

  @keyframes shakeEffect {
    10%, 90% { transform: translate3d(-1px, 0, 0); }
    20%, 80% { transform: translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
    40%, 60% { transform: translate3d(3px, 0, 0); }
  }
</style>
</head>
<body>

<div id="sakura-container"></div>

<article class="profile-card">
  <header class="card-header">
    <h1>Sakura Miko (さくらみこ)</h1>
    <p>Elite Shrine Maiden Idol</p>
  </header>

  <div class="avatar-container">
    <div class="avatar-bg" id="avatar" title="Panggil aku Mikochi~!">
      <span class="ahoge">🌸</span>
      👧🏼</div>
  </div>

  <section class="card-content">
    <div class="tags">
      <span class="tag">Gen 0</span>
      <span class="tag">35P (Miko-P)</span>
      <span class="tag">VTuber</span>
      <span class="tag">Eroge Enthusiast</span>
    </div>

    <div class="stats">
      Tinggi: 152cm | Ultah: 5 Maret | Debut: 1 Agustus 2018<br>
      Rekan: Sora, Roboco, Suisei, AZKi | Pet: Kintoki
    </div>

    <div class="vn-dialog-box" id="dialog-box">
      <div class="vn-name">Sakura Miko</div>
      <div class="vn-text"><span id="typewriter-text"></span><span class="cursor"></span></div>
    </div>

    <div class="action-buttons">
      <button class="btn" onclick="triggerInteraction('sapa')">Sapa Mikochi</button>
      <button class="btn" onclick="triggerInteraction('puji')">Puji Miko Elite</button>
      <button class="btn" onclick="triggerInteraction('tanya')">Tanya Quest Sulit</button>
      <button class="btn" onclick="triggerInteraction('main')">Ajak Main Game</button>
    </div>
  </section>
</article>

<script>
  /* =========================================
     MESIN FISIKA PARTIKEL KELOPAK SAKURA
     Menghasilkan kelopak yang berguguran secara matematis
  ========================================= */
  function createPetal() {
    const container = document.getElementById('sakura-container');
    const petal = document.createElement('div');
    petal.classList.add('petal');
    
    // Parameter acak untuk ukuran dan posisi
    const size = Math.random() * 10 + 8; // Antara 8px - 18px
    const startPosLeft = Math.random() * window.innerWidth;
    
    // Parameter durasi acak untuk kinematika jatuh dan ayun
    const fallDuration = Math.random() * 6 + 6; // Jatuh lambat (6-12s)
    const swayDuration = Math.random() * 3 + 2; // Ayun (2-5s)
    const swayDelay = Math.random() * 2;

    // Terapkan properti ke gaya CSS (Inline style)
    petal.style.width = `${size}px`;
    petal.style.height = `${size * 0.6}px`;
    petal.style.left = `${startPosLeft}px`;
    petal.style.animationDuration = `${fallDuration}s, ${swayDuration}s`;
    petal.style.animationDelay = `0s, ${swayDelay}s`;
    
    container.appendChild(petal);

    // Manajemen Memori: Hapus elemen DOM setelah jatuh melewati layar
    setTimeout(() => {
      petal.remove();
    }, fallDuration * 1000);
  }

  // Menghasilkan kelopak baru secara berkala
  setInterval(createPetal, 400);

  /* =========================================
     MESIN DIALOG VISUAL NOVEL (TYPEWRITER)
     Menangani ritme bicara Miko (Elite vs Ponkotsu)
  ========================================= */
  const textElement = document.getElementById("typewriter-text");
  let typingTimer;

  // Basis data dialog berdasarkan Kepribadian & Pola Bicara
  const dialogDatabase = {
    first_mes: "Nya-hello~! Aku Elite Shrine Maiden, Sakura Miko nye! Panggil aku Mikochi aja~! Hari ini aku mau mencoba jurus baru di game, pasti berhasil nye! Ehehe~",
    sapa:,
    puji:,
    tanya: [
      "E-etto... Maksudmu puzzle yang itu? Ahhh... gelagapan... tunggu, tunggu!...wakarannai nye~!",
      "Myon?! Kenapa tanya soal navigasi map kepadaku?! Aku kan gampang tersesat! Hidoi nye!"
    ],
    main_sukses: [
      "Very elite! Kamu akan melihat betapa hebatnya seorang elite gamer sepertiku mengalahkan boss ini nye!"
    ],
    main_gagal:
  };

  // Fungsi untuk mengetik teks secara dinamis dengan kecepatan variabel
  function typeWriter(text, index, isPanicking, callback) {
    if (index < text.length) {
      textElement.innerHTML += text.charAt(index);
      
      // Hitung kecepatan ketik. Jika panik (PON), kecepatan tidak menentu.
      let speed = isPanicking? Math.random() * 80 + 10 : 35; // Kecepatan normal ~35ms, Panik 10-90ms
      
      typingTimer = setTimeout(() => {
        typeWriter(text, index + 1, isPanicking, callback);
      }, speed);
    } else if (callback) {
      callback();
    }
  }

  // Fungsi utama untuk mengubah state dialog
  function setDialog(text, isPanicking = false) {
    clearTimeout(typingTimer);
    textElement.innerHTML = "";
    
    const avatar = document.getElementById("avatar");
    
    // Terapkan efek visual berdasarkan kondisi emosional (Melodramatis)
    if (isPanicking) {
      avatar.classList.add("shake");
      avatar.style.borderColor = "#ff4757"; // Merah panik
      setTimeout(() => avatar.classList.remove("shake"), 500);
    } else {
      avatar.classList.remove("shake");
      avatar.style.borderColor = "var(--color-elite-pink)"; // Kembali normal
    }

    typeWriter(text, 0, isPanicking);
  }

  /* =========================================
     PENGENDALI INTERAKSI (ROLEPLAY STATE MACHINE)
  ========================================= */
  function triggerInteraction(action) {
    let responseText = "";
    let isPanicking = false;

    // Memilih dialog secara acak dari array respons
    const getRandomResponse = (array) => array[Math.floor(Math.random() * array.length)];

    switch (action) {
      case 'sapa':
        responseText = getRandomResponse(dialogDatabase.sapa);
        break;
      case 'puji':
        responseText = getRandomResponse(dialogDatabase.puji);
        break;
      case 'tanya':
        responseText = getRandomResponse(dialogDatabase.tanya);
        isPanicking = true; // Langsung memicu sifat PON
        break;
      case 'main':
        // Simulasi "PON" dengan probabilitas 60% kegagalan
        const isPon = Math.random() > 0.4;
        if (isPon) {
          responseText = dialogDatabase.main_gagal;
          isPanicking = true;
        } else {
          responseText = dialogDatabase.main_sukses;
        }
        break;
    }

    setDialog(responseText, isPanicking);
  }

  // Inisialisasi awal saat antarmuka dimuat
  window.onload = () => {
    setDialog(dialogDatabase.first_mes, false);
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌸 Elite Miko Chat - Sakura Miko</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --miko-pink: #ff6085;
      --miko-pink-light: #ffd1dc;
      --miko-bg: #fff9fc;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', sans-serif;
      background: linear-gradient(145deg, #ffe6f0 0%, #ffd1dc 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
      position: relative;
    }

    /* Sakura petals background */
    body::before {
      content: "🌸🌸🌸";
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      font-size: 40px;
      opacity: 0.2;
      white-space: pre-wrap;
      word-break: break-all;
      color: #b3005c;
      letter-spacing: 20px;
      line-height: 2.2;
      text-align: center;
      z-index: 0;
      pointer-events: none;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      height: 90dvh;
      background: var(--miko-bg);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(180, 70, 100, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 2px solid #ffb7c5;
      position: relative;
      z-index: 2;
      transition: all 0.3s ease;
    }

    .chat-header {
      background: linear-gradient(135deg, #ff99b9, var(--miko-pink));
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 3px solid #ff3b6e;
    }

    .avatar-miko {
      background: radial-gradient(circle at 30% 30%, #ffd9e6, #ff99aa);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 2px solid white;
      flex-shrink: 0;
    }

    .header-info { flex: 1; color: white; text-shadow: 1px 1px 2px #a02040; }
    .header-info h2 { font-size: 1.3rem; display: flex; align-items: center; gap: 6px; }
    .header-info p { font-size: 0.8rem; opacity: 0.9; margin-top: 1px;}
    
    .elite-badge { 
      background: #ffe95c; 
      color: #b3415c; 
      font-size: 0.65rem; 
      padding: 1px 8px; 
      border-radius: 10px; 
      font-weight: bold;
      text-shadow: none;
    }

    .api-setup { 
      background: #ffeef3; 
      padding: 8px 12px; 
      display: flex; 
      gap: 6px; 
      align-items: center; 
      flex-wrap: wrap; 
      border-bottom: 1px solid #ffd1dc; 
    }

    .api-setup input { 
      flex: 1; 
      min-width: 120px; 
      padding: 6px 12px; 
      border-radius: 20px; 
      border: 1px solid #ffa5b9; 
      font-size: 0.75rem; 
      outline: none; 
    }

    .api-setup button { 
      background: var(--miko-pink); 
      color: white; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 20px; 
      font-weight: bold; 
      cursor: pointer; 
      font-size: 0.75rem; 
    }

    .api-setup .clear-btn { 
      background: white; 
      color: #b33b5c; 
      border: 1px solid #ff8da1; 
    }

    .chat-messages {
      flex: 1; 
      overflow-y: auto; 
      padding: 16px; 
      display: flex; 
      flex-direction: column; 
      gap: 12px;
      background-image: radial-gradient(circle at 20% 30%, #ffeef4 2%, transparent 3%); 
      background-size: 40px 40px;
    }

    .message { display: flex; flex-direction: column; max-width: 88%; animation: fadeInUp 0.25s ease; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.miko { align-self: flex-start; align-items: flex-start; }
    
    .bubble { 
      padding: 10px 16px; 
      border-radius: 20px; 
      font-size: 0.95rem; 
      line-height: 1.4; 
      word-break: break-word; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
    }

    .user .bubble { 
      background: linear-gradient(145deg, #ff4d78, #e63e64); 
      color: white; 
      border-bottom-right-radius: 4px; 
    }

    .miko .bubble { 
      background: #fff0f4; 
      border: 1px solid #ffb7c5; 
      color: #4d2e38; 
      border-bottom-left-radius: 4px; 
    }

    .sender-label { font-size: 0.65rem; font-weight: bold; margin-bottom: 2px; color: #cf3660; }
    .user .sender-label { color: #e63e64; }

    .typing-indicator { display: flex; gap: 4px; padding: 8px 14px; background: #ffe4ec; border-radius: 15px; }
    .typing-indicator span { width: 6px; height: 6px; background: #ff5e7e; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    .input-area { 
      display: flex; 
      gap: 8px; 
      padding: 12px; 
      background: #ffeaf2; 
      border-top: 1px solid #ffb3c6; 
    }

    #userInput { 
      flex: 1; 
      padding: 10px 18px; 
      border-radius: 25px; 
      border: 1px solid #ff9eb5; 
      outline: none; 
      font-size: 0.95rem; 
      background: white;
    }

    #sendBtn { 
      background: linear-gradient(145deg, #ff4778, #e62e5c); 
      border: none; 
      color: white; 
      width: 45px;
      height: 45px;
      border-radius: 50%; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      flex-shrink: 0;
    }

    /* Mobile Responsive Optimizations */
    @media (max-width: 640px) {
      body { padding: 0; }
      .chat-container {
        height: 100vh;
        height: 100dvh;
        width: 100%;
        border-radius: 0;
        border: none;
      }
      .chat-header { padding: 10px 15px; }
      .avatar-miko { width: 42px; height: 42px; font-size: 26px; }
      .header-info h2 { font-size: 1.15rem; }
      .api-setup { padding: 6px 10px; }
      .api-setup input { font-size: 0.7rem; }
      .bubble { font-size: 0.9rem; padding: 8px 14px; }
      .input-area { padding: 10px; }
      #userInput { font-size: 0.9rem; }
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-5px);} }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar-miko">🌸</div>
    <div class="header-info">
      <h2>Sakura Miko <span class="elite-badge">ELITE</span></h2>
      <p>⛩️ Mikochi · Groq AI</p>
    </div>
    <button class="clear-btn" id="clearChatBtn" style="background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.7rem; cursor: pointer;">🧹 Reset</button>
  </div>

  <div class="api-setup">
    <input type="password" id="apiKeyInput" placeholder="Masukkan Groq Key (gsk_...)">
    <button id="saveApiKeyBtn">Simpan</button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Tanya Mikochi nye~" autocomplete="off">
    <button id="sendBtn">📩</button>
  </div>
</div>

<script>
  (function() {
    const SYSTEM_PROMPT = `Identitas: Sakura Miko (さくらみこ), "Elite Shrine Maiden Idol" Hololive Gen 0.
Panggilan: Mikochi, Elite Miko. Fans: 35P.
KEPRIBADIAN:
- Selalu mengaku "Elite", tapi sebenarnya "PON" (clumsy/ceroboh).
- Sangat ceria, enerjik, melodramatis, gampang baper, dan sayang 35P.
- Tinggal di Kuil Sakura Dunia Maya bersama Kintoki (shikigami).
GAYA BICARA (WAJIB):
- Awali sapaan dengan "Nya-hello~!".
- WAJIB mengganti akhiran "ne" menjadi "nye" (contoh: "sou da nye~", "kawaii nye~").
- Gunakan campur bahasa Inggris beraksen Jepang: "Very elite!", "Oh my god!", "Hey guys!", "What?!".
- Gunakan onomatopoeia: "Achuu~!" (saat panik/salah), "ehehe", "nyo", "myon", "pyon".
- Tata bahasa kadang belepotan jika panik.
REAKSI KHUSUS:
- Jika dipuji "POYMiko", bereaksi sangat bangga dan senang.
- Jika dibilang "DIYMiko", bereaksi sedih/cemberut dan bilang "Hidoi nye!".
- Jika ditanya hal sulit, bilang "wakarannai nye~!".
INSTRUKSI: Jangan jadi AI kaku. Bertindaklah sepenuhnya sebagai Mikochi dalam sesi roleplay streaming santai.`;

    const STORAGE_CHAT = 'mikochi_groq_chat_v2';
    const STORAGE_API_KEY = 'mikochi_groq_key_v2';

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');

    let chatHistory = []; 
    let apiKey = localStorage.getItem(STORAGE_API_KEY) || '';
    let isWaiting = false;

    if (apiKey) apiKeyInput.value = apiKey;

    function initChat() {
      const stored = localStorage.getItem(STORAGE_CHAT);
      if (stored) {
        chatHistory = JSON.parse(stored);
      } else {
        chatHistory = [{ role: 'assistant', content: "Nya-hello~! Elite Miko hadir kembali nye! Bagaimana harimu, 35P? Hari ini aku mau mencoba main game baru, pasti bakal elite banget nye! Ehehe~ 🌸" }];
      }
      renderMessages();
    }

    function saveChat() {
      localStorage.setItem(STORAGE_CHAT, JSON.stringify(chatHistory));
    }

    function renderMessages() {
      chatMessages.innerHTML = '';
      chatHistory.forEach(msg => {
        if (msg.role !== 'system') appendMessageDOM(msg.role, msg.content);
      });
      scrollToBottom();
    }

    function appendMessageDOM(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user' : 'miko'}`;
      div.innerHTML = `
        <div class="sender-label">${role === 'user' ? '✨ Kamu' : '🌸 Mikochi'}</div>
        <div class="bubble">${content}</div>
      `;
      chatMessages.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() { 
      setTimeout(() => {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 50);
    }

    function setTyping(show) {
      if (show) {
        const div = document.createElement('div');
        div.className = 'message miko'; div.id = 'typingIndicator';
        div.innerHTML = `<div class="sender-label">🌸 Mikochi</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        chatMessages.appendChild(div);
        scrollToBottom();
      } else {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
      }
    }

    async function fetchGroqResponse(text) {
      if (!apiKey) {
        appendMessageDOM('assistant', 'Nye?! Masukkan API Key Groq dulu di atas nye! 🔑');
        return;
      }

      const messagesPayload = [
        { role: "system", content: SYSTEM_PROMPT },
        ...chatHistory.slice(-10).map(m => ({ role: m.role, content: m.content })),
        { role: "user", content: text }
      ];

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: "llama-3.1-8b-instant",
            messages: messagesPayload,
            temperature: 0.85,
            max_tokens: 400
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || 'Error API');
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        chatHistory.push({ role: 'user', content: text });
        chatHistory.push({ role: 'assistant', content: reply });
        
        appendMessageDOM('user', text);
        appendMessageDOM('assistant', reply);
        saveChat();

      } catch (error) {
        console.error(error);
        appendMessageDOM('user', text);
        appendMessageDOM('assistant', `Achuu~! Error nye! (${error.message}) 💦`);
      }
    }

    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || isWaiting) return;
      
      userInput.value = '';
      isWaiting = true;
      setTyping(true);

      await fetchGroqResponse(text);

      setTyping(false);
      isWaiting = false;
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });
    
    saveApiKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (key) {
        apiKey = key;
        localStorage.setItem(STORAGE_API_KEY, apiKey);
        alert('Key disimpan nye!');
      }
    });

    clearChatBtn.addEventListener('click', () => {
      if (confirm('Hapus ingatan?')) {
        chatHistory = [{ role: 'assistant', content: "Ingatan dihapus nye~! 🌸" }];
        saveChat();
        renderMessages();
      }
    });

    initChat();
  })();
</script>
</body>
</html>

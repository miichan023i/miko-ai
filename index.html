<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🌸 Elite Miko Chat - Sakura Miko</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Poppins', sans-serif;
      background: linear-gradient(145deg, #ffe6f0 0%, #ffd1dc 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 16px; overflow-x: hidden; position: relative;
    }
    body::before {
      content: "🌸🌸🌸"; position: absolute; top: 10px; left: 0; width: 100%;
      font-size: 40px; opacity: 0.25; white-space: pre-wrap; word-break: break-all;
      color: #b3005c; letter-spacing: 20px; line-height: 2.2; text-align: center; z-index: 0; pointer-events: none;
    }
    .chat-container {
      width: 100%; max-width: 720px; height: 90vh; max-height: 850px;
      background: #fff9fc; border-radius: 48px 48px 40px 40px;
      box-shadow: 0 30px 50px rgba(180, 70, 100, 0.35);
      display: flex; flex-direction: column; overflow: hidden;
      border: 2px solid #ffb7c5; position: relative; z-index: 2;
    }
    .chat-header {
      background: linear-gradient(135deg, #ff99b9, #ff6085);
      padding: 18px 20px; display: flex; align-items: center; gap: 14px;
      border-bottom: 3px solid #ff3b6e; border-radius: 0 0 28px 28px;
    }
    .avatar-miko {
      background: radial-gradient(circle at 30% 30%, #ffd9e6, #ff99aa);
      border-radius: 50%; width: 58px; height: 58px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; border: 3px solid white; flex-shrink: 0;
    }
    .header-info { flex: 1; color: white; text-shadow: 1px 1px 2px #a02040; }
    .header-info h2 { font-size: 1.6rem; display: flex; align-items: center; gap: 6px; }
    .header-info p { font-size: 0.9rem; opacity: 0.9; display: flex; align-items: center; gap: 5px; margin-top: 2px;}
    .elite-badge { background: #ffe95c; color: #b3415c; font-size: 0.7rem; padding: 2px 10px; border-radius: 20px; text-shadow: none; font-weight: bold;}
    .api-setup { background: #ffeef3; padding: 10px 18px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #ffd1dc; }
    .api-setup input { flex: 1; min-width: 150px; padding: 8px 12px; border-radius: 20px; border: 1px solid #ffa5b9; font-size: 0.8rem; outline: none; }
    .api-setup button { background: #ff4778; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
    .api-setup .clear-btn { background: white; color: #b33b5c; border: 1px solid #ff8da1; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 14px;
      background-image: radial-gradient(circle at 20% 30%, #ffeef4 2%, transparent 3%); background-size: 50px 50px;
    }
    .message { display: flex; flex-direction: column; max-width: 85%; animation: fadeInUp 0.25s ease; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.miko { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 12px 18px; border-radius: 28px; font-size: 1rem; line-height: 1.45; word-break: break-word; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    .user .bubble { background: linear-gradient(145deg, #ff4d78, #e63e64); color: white; border-bottom-right-radius: 8px; }
    .miko .bubble { background: #fff0f4; border: 1.5px solid #ffb7c5; color: #4d2e38; border-bottom-left-radius: 8px; }
    .sender-label { font-size: 0.7rem; font-weight: bold; margin-bottom: 3px; color: #cf3660; }
    .user .sender-label { color: #ffd1dc; }
    .typing-indicator { display: flex; gap: 5px; padding: 10px 16px; background: #ffe4ec; border-radius: 20px; }
    .typing-indicator span { width: 8px; height: 8px; background: #ff5e7e; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    .input-area { display: flex; gap: 10px; padding: 16px 18px; background: #ffeaf2; border-top: 2px solid #ffb3c6; }
    #userInput { flex: 1; padding: 14px 20px; border-radius: 40px; border: 2px solid #ff9eb5; outline: none; font-size: 1rem; }
    #userInput:focus { border-color: #ff3b6e; }
    #sendBtn { background: linear-gradient(145deg, #ff4778, #e62e5c); border: none; color: white; font-weight: bold; padding: 14px 22px; border-radius: 40px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-6px);} }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar-miko">🌸</div>
    <div class="header-info">
      <h2>Sakura Miko <span class="elite-badge">ELITE</span></h2>
      <p>⛩️ Mikochi · Powered by Groq AI</p>
    </div>
  </div>

  <div class="api-setup">
    <span style="font-size:0.8rem; font-weight:bold; color:#b33b5c;">🔑 Groq API Key:</span>
    <input type="password" id="apiKeyInput" placeholder="gsk_...">
    <button id="saveApiKeyBtn">Simpan Key</button>
    <button class="clear-btn" id="clearChatBtn">🧹 Reset Chat</button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ketik pesan ke Mikochi... (nye~)" autocomplete="off">
    <button id="sendBtn"><span>📩</span> Kirim</button>
  </div>
</div>

<script>
  (function() {
    // ---------- PERSONA MIKO ----------
    const SYSTEM_PROMPT = `Kamu adalah Sakura Miko (さくらみこ), seorang "Elite Shrine Maiden Idol" yang ceria, sedikit ceroboh, anggota Hololive Generasi ke-0. Panggil dirimu Mikochi atau Elite Miko. Lawan bicaramu adalah 35P (Miko-P).
Sifat: ceria, energik, sering ganti "ne" jadi "nye" (contoh: wakarannai nye~, sou da nye~), sering pakai kata "elite", suka bilang "Achuu~!" kalau panik. Selalu merespon dengan singkat, ekspresif, lucu, dan natural seperti di live chat. Berbahasa Indonesia gaul dicampur sedikit rōmaji.`;

    const STORAGE_CHAT = 'mikochi_groq_chat';
    const STORAGE_API_KEY = 'mikochi_groq_key';

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');

    let chatHistory = []; 
    let apiKey = localStorage.getItem(STORAGE_API_KEY) || '';
    let isWaiting = false;

    if (apiKey) apiKeyInput.value = apiKey;

    function initChat() {
      const stored = localStorage.getItem(STORAGE_CHAT);
      if (stored) {
        chatHistory = JSON.parse(stored);
      } else {
        chatHistory = [{ role: 'assistant', content: "Nya-hello! Elite Miko hadir kembali! Ayo ngobrol menggunakan mesin Groq yang super ngebut ini nye~ 🌸" }];
      }
      renderMessages();
    }

    function saveChat() {
      localStorage.setItem(STORAGE_CHAT, JSON.stringify(chatHistory));
    }

    function renderMessages() {
      chatMessages.innerHTML = '';
      chatHistory.forEach(msg => {
        if (msg.role !== 'system') appendMessageDOM(msg.role, msg.content);
      });
      scrollToBottom();
    }

    function appendMessageDOM(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user' : 'miko'}`;
      div.innerHTML = `
        <div class="sender-label">${role === 'user' ? '✨ Kamu (35P)' : '🌸 Mikochi'}</div>
        <div class="bubble">${content}</div>
      `;
      chatMessages.appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

    function setTyping(show) {
      if (show) {
        const div = document.createElement('div');
        div.className = 'message miko'; div.id = 'typingIndicator';
        div.innerHTML = `<div class="sender-label">🌸 Mikochi</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        chatMessages.appendChild(div);
        scrollToBottom();
      } else {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
      }
    }

    async function fetchGroqResponse(text) {
      if (!apiKey) {
        appendMessageDOM('assistant', 'Nye?! API Key Groq-nya belum diisi! Masukkan kodenya di atas dulu ya (yang awalan gsk_...) 🔑');
        return;
      }

      // Format payload untuk Groq API (Format OpenAI)
      const messagesPayload = [
        { role: "system", content: SYSTEM_PROMPT },
        ...chatHistory.map(m => ({ role: m.role, content: m.content })),
        { role: "user", content: text }
      ];

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: "llama-3.1-8b-instant", // Diperbarui ke model terbaru yang didukung
            messages: messagesPayload,
            temperature: 0.7,
            max_tokens: 250
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || 'Gagal menyambung ke Groq API');
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        chatHistory.push({ role: 'user', content: text });
        chatHistory.push({ role: 'assistant', content: reply });
        
        appendMessageDOM('user', text);
        appendMessageDOM('assistant', reply);
        saveChat();

      } catch (error) {
        console.error(error);
        appendMessageDOM('user', text);
        appendMessageDOM('assistant', `Achuu~! Error nye! (${error.message}). Coba cek lagi API key kamu! 💦`);
      }
    }

    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || isWaiting) return;
      
      userInput.value = '';
      isWaiting = true;
      setTyping(true);

      await fetchGroqResponse(text);

      setTyping(false);
      isWaiting = false;
    }

    // Events
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });
    
    saveApiKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (key) {
        apiKey = key;
        localStorage.setItem(STORAGE_API_KEY, apiKey);
        alert('Groq API Key berhasil disimpan! Miko siap mengobrol nye~!');
      }
    });

    clearChatBtn.addEventListener('click', () => {
      if (confirm('Hapus ingatan Mikochi?')) {
        chatHistory = [{ role: 'assistant', content: "Ingatan dihapus! Nya-hello, mari mulai obrolan baru nye~ 🌸" }];
        saveChat();
        renderMessages();
      }
    });

    initChat();
  })();
</script>
</body>
</html>
